name: Publish to npm

# Trigger on version tags (v0.1.0, v1.2.3, etc.)
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Test & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for provenance publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          # This injects NODE_AUTH_TOKEN from the secret into the npm config
          # automatically. Store your npm token as NPM_TOKEN in GitHub secrets.
          scope: '@pratik'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test --workspaces --if-present

      # Publish CLI package first (it depends on the skills pack at runtime,
      # but the pack doesn't depend on the CLI, so order doesn't matter strictly).
      - name: Publish @pratik/agent-skills (CLI)
        run: npm publish --access restricted
        working-directory: packages/cli
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @pratik/agent-skills-dotnet (skills pack)
        run: npm publish --access restricted
        working-directory: packages/skills-dotnet
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Tag published versions in git for traceability.
      # The pushed tag (e.g. v0.1.0) already serves as the release marker —
      # this step is a no-op placeholder if you want per-package tags instead.
      - name: Log published version
        run: |
          echo "Published tag: ${{ github.ref_name }}"
          echo "CLI version:   $(node -p "require('./packages/cli/package.json').version")"
          echo "Pack version:  $(node -p "require('./packages/skills-dotnet/package.json').version")"
