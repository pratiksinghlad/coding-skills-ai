name: Publish to npm

# Trigger on version tags (v0.1.0, v1.2.3, etc.)
on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Test & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for provenance publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Publish the single unified package containing the CLI and all templates using Trusted Publisher OIDC
      - name: Publish @pratikpsl/agent-skills
        run: npm publish --provenance --access public

      # Tag published versions in git for traceability.
      - name: Log published version
        run: |
          echo "Published tag: ${{ github.ref_name }}"
          echo "Package version: $(node -p "require('./package.json').version")"
