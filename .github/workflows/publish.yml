name: Publish to npm

# Trigger on version tags (v0.1.0, v1.2.3, etc.)
on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    name: Test & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # Required for provenance publishing

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          # This injects NODE_AUTH_TOKEN from the secret into the npm config
          # automatically. Store your npm token as NPM_TOKEN in GitHub secrets.
          scope: '@pratikpsl'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      # Publish the single unified package containing the CLI and all templates
      - name: Publish @pratikpsl/agent-skills
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Tag published versions in git for traceability.
      - name: Log published version
        run: |
          echo "Published tag: ${{ github.ref_name }}"
          echo "Package version: $(node -p "require('./package.json').version")"
